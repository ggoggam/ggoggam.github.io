[tools]
bun = "latest"
prek = "latest"
# prettier/eslint/tsc are node-shebang binaries even when launched via `bun run`. Hosted
# ubuntu-latest preinstalls Node 20+, but the self-hosted Railway runner only has an
# ancient system node, so pin a modern one here.
node = "lts"

[tasks.install]
description = "Install frontend dependencies"
run = "bun install --frozen-lockfile"

[tasks.dev]
description = "Start the dev server"
depends = ["install"]
run = "bun run dev"

[tasks."pre-commit"]
description = "Run pre-commit checks via prek"
depends = ["install"]
run = "prek run --show-diff-on-failure --color=always --all-files --hook-stage=manual"
